  <rect x="16" y="16" width="48" height="30" rx="8" fill="#fb7185"/>
  <!-- Eyes - winking style, one closed -->
  <circle cx="30" cy="30" r="5" fill="#1e1e2e"/>
  <circle cx="32" cy="28" r="1.5" fill="#fff"/>
  <path d="M45 30 Q50 26 55 30" stroke="#1e1e2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

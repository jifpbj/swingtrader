<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Antenna - two prongs -->
  <line x1="33" y1="16" x2="30" y2="6" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="16" x2="50" y2="6" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="30" cy="5" r="2.5" fill="#a78bfa"/>
  <circle cx="50" cy="5" r="2.5" fill="#a78bfa"/>
  <!-- Head -->
  <rect x="18" y="16" width="44" height="32" rx="6" fill="#a78bfa"/>
  <!-- Eyes - square-ish -->
  <rect x="26" y="27" width="9" height="9" rx="2" fill="#1e1e2e"/>
  <rect x="45" y="27" width="9" height="9" rx="2" fill="#1e1e2e"/>
  <!-- Eye glints -->
  <rect x="31" y="28" width="3" height="3" rx="1" fill="#fff"/>
  <rect x="50" y="28" width="3" height="3" rx="1" fill="#fff"/>
  <!-- Mouth - small o -->
  <circle cx="40" cy="42" r="3" fill="#1e1e2e"/>
  <circle cx="40" cy="42" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <!-- Body -->
  <rect x="26" y="52" width="28" height="22" rx="4" fill="#a78bfa" opacity="0.8"/>
  <!-- Body screen -->
  <rect x="31" y="56" width="18" height="10" rx="2" fill="#1e1e2e" opacity="0.3"/>
  <line x1="34" y1="60" x2="42" y2="60" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="34" y1="63" x2="38" y2="63" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
</svg>

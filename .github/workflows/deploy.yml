name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 for all action runners (required after June 2026).
# actions/checkout, actions/setup-node, and FirebaseExtended/action-hosting-deploy
# all run on Node.js internally — this env var upgrades that runtime without
# affecting which Node version the Next.js build itself uses (set per-step below).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend: build Docker image → Artifact Registry → Cloud Run ──────────
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'deploy-preview')

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: predict-alpha-4ed0c
      REGION: us-west1
      SERVICE: predictive-alpha-api
      IMAGE: us-west1-docker.pkg.dev/predict-alpha-4ed0c/cloud-run-source-deploy/predictive-alpha-api

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./backend

          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --set-env-vars "APP_ENV=production" \
            --set-secrets "ALPACA_API_KEY=ALPACA_API_KEY:latest,ALPACA_SECRET_KEY=ALPACA_SECRET_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest" \
            --quiet
          # Firebase/Firestore auth uses Application Default Credentials (ADC) on
          # Cloud Run — no GOOGLE_APPLICATION_CREDENTIALS secret is needed here.
          # The runtime service account must have roles/datastore.user granted.
          # See one-time setup instructions in the README / below.

  # ── Frontend: build Next.js → Firebase Hosting ───────────────────────────
  deploy-frontend:
    name: Frontend → Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://predictive-alpha-api-hfdxzjchaq-uw.a.run.app
          NEXT_PUBLIC_WS_URL: wss://predictive-alpha-api-hfdxzjchaq-uw.a.run.app/ws/trades
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: predict-alpha-4ed0c.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: predict-alpha-4ed0c
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: predict-alpha-4ed0c.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "512286989618"
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_STRIPE_BASIC_LINK: https://buy.stripe.com/00waEZ64S3zWbAadqtbQY01
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: predict-alpha-4ed0c

      - name: Deploy to Firebase Hosting (preview)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: predict-alpha-4ed0c

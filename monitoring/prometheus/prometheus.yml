global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: predictive-alpha

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: predictive-alpha
    static_configs:
      - targets: [backend:8080]
    metrics_path: /metrics
    scrape_interval: 10s

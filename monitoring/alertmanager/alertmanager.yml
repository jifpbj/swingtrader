global:
  resolve_timeout: 5m
  # To enable Slack alerts, replace REPLACE_WITH_YOUR_SLACK_WEBHOOK_URL below
  # with your actual Slack incoming webhook URL, then restart alertmanager:
  #   docker compose restart alertmanager
  # Get a webhook URL at: https://api.slack.com/messaging/webhooks

route:
  group_by: [alertname, job]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-default
  routes:
    - matchers:
        - severity = critical
      receiver: slack-critical
      continue: false
    - matchers:
        - severity = warning
      receiver: slack-default
      continue: false
    - matchers:
        - severity = info
      receiver: slack-info
      continue: false

inhibit_rules:
  # ServiceDown suppresses all other alerts for the same job — avoids cascade noise.
  - source_matchers:
      - alertname = ServiceDown
    target_matchers:
      - job = predictive-alpha
    equal: [job]

receivers:
  - name: slack-default
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK"
        channel: "#alerts"
        send_resolved: true
        icon_emoji: ":warning:"
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}

  - name: slack-critical
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK"
        channel: "#alerts-critical"
        send_resolved: true
        icon_emoji: ":fire:"
        title: "<!here> [CRITICAL] {{ .CommonLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ end }}

  - name: slack-info
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK"
        channel: "#alerts"
        send_resolved: false
        icon_emoji: ":information_source:"
        title: "[INFO] {{ .CommonLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ end }}

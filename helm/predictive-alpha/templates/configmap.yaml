apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predictive-alpha.fullname" . }}-config
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  APP_HOST: "0.0.0.0"
  APP_PORT: {{ .Values.service.targetPort | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  USE_MOCK_DATA: {{ .Values.config.useMockData | quote }}

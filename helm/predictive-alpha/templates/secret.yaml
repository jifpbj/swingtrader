apiVersion: v1
kind: Secret
metadata:
  name: {{ include "predictive-alpha.fullname" . }}-secrets
type: Opaque
stringData:
  ALPACA_API_KEY: {{ .Values.secrets.alpacaApiKey | quote }}
  ALPACA_SECRET_KEY: {{ .Values.secrets.alpacaSecretKey | quote }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | quote }}

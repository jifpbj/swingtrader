replicaCount: 2

image:
  repository: us-west1-docker.pkg.dev/predict-alpha-4ed0c/cloud-run-source-deploy/predictive-alpha-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: api.predictivealpha.com
  tlsSecretName: predictive-alpha-tls

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

config:
  appEnv: production
  logLevel: INFO
  useMockData: "false"

# Secret values — supply via --set or encrypted values file (never commit real values)
secrets:
  alpacaApiKey: ""
  alpacaSecretKey: ""
  stripeSecretKey: ""
  stripeWebhookSecret: ""
  resendApiKey: ""
